<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="ip2">

    </ul>
</body>

<script>
main();

    async function main() {
        const rand = await getData();

        const ipUl = document.querySelector("#ip2")

        for (const ipp of rand) {
            ipUl.innerHTML += `<li>${ipp.ip}</li>`;
        }

    }

    async function getData () {
        const res = await fetch("mb.json");
        const data = await res.json();

        return data;
    }
</script>
</html>

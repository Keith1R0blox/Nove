<script>
    main();

    async function main() {
        const rand = await getData();

        const ipUl = document.querySelector("#serve")

        for (const ipp of rand) {
            ipUl.innerHTML += `<div class="servers"">
        <a><img src="${ipp.img}">
          <h4>${ipp.name}</h4>
          <h5>${ipp.name2}</h5></a>
    </div>`;
        }

    }

    async function getData () {
        const res = await fetch("../../navbarjson/URI.json");
        const data = await res.json();

        return data;
    }

</script>

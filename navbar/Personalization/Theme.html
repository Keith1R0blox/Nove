<script>
    main();

    async function main() {
        const rand = await getData();

        const ipUl = document.querySelector("#section")

        for (const ipp of rand) {
            ipUl.innerHTML += `            <div class="theme">
                <a>${ipp.name}</a>
            </div>
            <div class="maintheme">
                <a>${ipp.desc}</a><br>
                <p>Made by ${ipp.Owner}</p>
                <button class="submitbutton applytheme" value="${ipp.repo}">Apply</button>
                <img src="${ipp.img}">
            </div>`;
        }

        const css = document.getElementById("csss")
        document.querySelectorAll('.applytheme').forEach(button =>{
            button.addEventListener("click", () => {
                localStorage.setItem("style", button.value)
